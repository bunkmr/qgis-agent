<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2E86C1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A5276;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#85C1E9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3498DB;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- 圆角方形背景 -->
  <rect x="2" y="2" width="60" height="60" rx="12" ry="12" fill="url(#bg)"/>
  <!-- 地图网格线 -->
  <path d="M10 20 L54 20 M10 30 L54 30 M10 40 L54 40 M10 50 L54 50" stroke="#5DADE2" stroke-width="0.5" fill="none" opacity="0.4"/>
  <path d="M20 10 L20 54 M30 10 L30 54 M40 10 L40 54 M50 10 L50 54" stroke="#5DADE2" stroke-width="0.5" fill="none" opacity="0.4"/>
  <!-- 地图多边形 (地形) -->
  <path d="M14 48 L22 30 L30 38 L38 26 L46 34 L50 48 Z" fill="#82E0AA" opacity="0.5" stroke="#27AE60" stroke-width="0.8"/>
  <!-- 连接点 -->
  <circle cx="22" cy="30" r="3" fill="#F4D03F" stroke="#F1C40F" stroke-width="1"/>
  <circle cx="30" cy="38" r="2.5" fill="#F4D03F" stroke="#F1C40F" stroke-width="1"/>
  <circle cx="38" cy="26" r="2.5" fill="#F4D03F" stroke="#F1C40F" stroke-width="1"/>
  <circle cx="46" cy="34" r="2.5" fill="#F4D03F" stroke="#F1C40F" stroke-width="1"/>
  <!-- AI 星星/火花 -->
  <g transform="translate(36, 18)">
    <polygon points="0,-8 2,-2 8,-2 3,2 5,8 0,4 -5,8 -3,2 -8,-2 -2,-2" fill="#F9E79F" opacity="0.9"/>
  </g>
  <!-- AI 字母 -->
  <text x="32" y="56" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#FFFFFF" opacity="0.9">AI</text>
</svg>
